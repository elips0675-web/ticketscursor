services:
  mysql:
    image: mysql:8.4
    container_name: sd-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: servicedesk
      MYSQL_USER: ${DB_USER:-sduser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-sdpassword}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - mysql_backup:/backup
      - ./server/seed.sql:/docker-entrypoint-initdb.d/seed.sql
      - ./mysql/primary.cnf:/etc/mysql/conf.d/replication.cnf
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql_replica:
    image: mysql:8.4
    container_name: sd-mysql-replica
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: servicedesk
    ports:
      - "3308:3306"
    volumes:
      - mysql_replica_data:/var/lib/mysql
      - ./mysql/replica.cnf:/etc/mysql/conf.d/replication.cnf
      - ./mysql/init-replica.sh:/docker-entrypoint-initdb.d/init-replica.sh
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.8
    container_name: sd-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-meilisearch-master-key}
      MEILI_ENV: production
    volumes:
      - meilisearch_data:/meili_data
    ports:
      - "7700:7700"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  db_backup:
    image: alpine:3.20
    container_name: sd-db-backup
    restart: unless-stopped
    command: >
      sh -c "
        apk add --no-cache mysql-client &&
        while true; do
          DATE=\$(date +%Y%m%d_%H%M%S) &&
          mysqldump -h mysql -u root -p\${DB_ROOT_PASSWORD:-root} --single-transaction --routines --triggers servicedesk > /backup/servicedesk_\$DATE.sql &&
          echo \"Backup saved: servicedesk_\$DATE.sql\" &&
          find /backup -name 'servicedesk_*.sql' -mtime +7 -delete &&
          sleep 86400
        done
      "
    environment:
      DB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    volumes:
      - mysql_backup:/backup
    depends_on:
      mysql:
        condition: service_healthy

  api:
    build: ./server
    container_name: sd-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PORT: 4000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER:-sduser}
      DB_PASSWORD: ${DB_PASSWORD:-sdpassword}
      DB_NAME: servicedesk
      DATABASE_URL: mysql://${DB_USER:-sduser}:${DB_PASSWORD:-sdpassword}@mysql:3306/servicedesk
      DIRECT_DATABASE_URL: mysql://${DB_USER:-sduser}:${DB_PASSWORD:-sdpassword}@mysql:3306/servicedesk
      REPLICA_DATABASE_URL: mysql://${DB_USER:-sduser}:${DB_PASSWORD:-sdpassword}@mysql_replica:3306/servicedesk
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      MEILISEARCH_URL: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-meilisearch-master-key}
      NODE_ENV: production
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: .
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: sd-frontend
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: sd-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    volumes:
      - prometheus_data:/prometheus
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.2.0
    container_name: sd-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    ports:
      - "3001:3000"

volumes:
  mysql_data:
  mysql_backup:
  mysql_replica_data:
  uploads_data:
  prometheus_data:
  grafana_data:
  meilisearch_data:
